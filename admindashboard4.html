<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Infonative Solutions | Admin Dashboard</title>
  <link rel="stylesheet" href="admindashboard3.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body>
  <!-- Mobile Menu Button -->
  <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="#">
    <i class="bi bi-list"></i>
  </button>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-text">MindScroll</span>
    </div>
    <div class="nav-section">
      <button class="nav-item-custom active">Dashboard</button>
      <button class="nav-item-custom">Courses</button>
      <button class="nav-item-custom">Resources</button>
      <button class="nav-item-custom">Chat</button>
      <button class="nav-item-custom">Schedule</button>
      <button class="nav-item-custom">Profile</button>
      <button class="nav-item-custom">Settings</button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
  <!-- Topbar -->
  <div class="topbar">
    <h1>Dashboard</h1>
    <div class="topbar-right">
      <button class="ask-ai-btn">Ask AI</button>
      <select class="lang-select" aria-label="#">
        <option>English</option>
        <option>Hindi</option>
        <option>French</option>
      </select>
      <i class="bi bi-bell topbar-icon"></i>
      <div class="user-pill">
        <div class="user-avatar">IN</div>
        Infonative
      </div>
    </div>
  </div>
  
  <!-- Content Grid -->
  <div class="content-grid">
    <!-- LEFT -->
    <div class="left-col">
      <!-- Discovery -->
      <p class="section-title">Content Discovery</p>
      <div class="discovery-scroll">
        <!-- FIXED CARD -->
        <div class="course-card">
          <div class="course-thumb">📚</div>
          <div class="course-meta">
            <span class="course-name">Digital Literacy</span>
            <span class="star-rating">★ 4.5</span>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-label">Points</div>
          <div class="stat-value">185</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Badges</div>
          <div class="stat-value">10</div>
        </div>
      </div>
    </div>
    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="resume-banner">
        <div>Digital Literacy</div>
        <button class="resume-btn">Resume</button>
      </div>
      <div class="social-wall-card">
        <p>Social Wall</p>
        <div id="socialFeed"></div>
      </div>
    </div>
  </div>
</main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="admindashboard3.js"></script>
</body>
</html>
