<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindScroll Dashboard</title>
    <link rel="stylesheet" href="mindscrolldashboard.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo"><strong>Mind</strong>Scroll</div>
            <nav>
                <div class="nav-item active">Dashboard</div>
                <div class="nav-item">Courses</div>
                <div class="nav-item">Resources</div>
                <div class="nav-item">Chat</div>
                <div class="nav-item">Schedule</div>
            </nav>
        </aside>

        <main class="content">
            <header class="top-bar">
                <h1>Dashboard</h1>
                <div class="user-profile">Ask AI | English | InfoNative</div>
            </header>

            <section class="stats-grid">
                <div class="stat-card"><span>Points</span> <strong>185</strong></div>
                <div class="stat-card"><span>Badges</span> <strong>10</strong></div>
                <div class="stat-card"><span>Certificates</span> <strong>10</strong></div>
                <div class="stat-card highlight"><span>Time Spent</span> <strong>02:53</strong></div>
            </section>

            <div class="main-grid">
                <section class="courses-section">
                    <h3>My Courses</h3>
                    <div class="course-card">
                        <div class="course-img"></div>
                        <div class="course-info">
                            <h4>Digital Literacy</h4>
                            <p>Progress: 100%</p>
                            <button class="btn btn-primary">Completed</button>
                        </div>
                    </div>
                </section>

                <section class="social-wall">
                    <h3>Social Wall</h3>
                    <div class="social-item">Team UI/UX: Finished React hooks!</div>
                    <div class="social-item">Team Law: New module unlocked.</div>
                </section>
            </div>
        </main>
    </div>
    <script src="mindscrolldashboard.js" charset="UTF-8"></script>
</body>
</html>
